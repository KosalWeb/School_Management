<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>License Key Generator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
.container {
    background: white;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    width: 100%;
    max-width: 480px;
    padding: 40px;
}
h1 { font-size: 24px; color: #1a1a2e; margin-bottom: 4px; text-align: center; }
.subtitle { color: #666; font-size: 14px; text-align: center; margin-bottom: 32px; }
label { display: block; font-size: 13px; font-weight: 600; color: #333; margin-bottom: 6px; }
input, output {
    width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 8px;
    font-size: 15px; font-family: 'SF Mono', 'Fira Code', monospace;
    outline: none; transition: border-color 0.2s;
}
input:focus { border-color: #667eea; }
.input-group { margin-bottom: 20px; }
output {
    display: block; background: #f8f9fa; border-color: #d4edda; color: #155724;
    font-size: 18px; letter-spacing: 2px; text-align: center; word-break: break-all; min-height: 48px;
}
output:empty::before { content: 'Waiting...'; color: #aaa; font-size: 14px; letter-spacing: normal; }
button {
    width: 100%; padding: 12px; background: #667eea; color: white; border: none;
    border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 4px;
}
button:hover { background: #5a6fd6; }
.copy-btn { background: #28a745; margin-top: 8px; }
.copy-btn:hover { background: #218838; }
.copy-btn.copied { background: #17a2b8; }
.info {
    margin-top: 24px; padding: 12px; background: #fff3cd; border: 1px solid #ffeeba;
    border-radius: 8px; font-size: 12px; color: #856404; line-height: 1.5;
}
hr { border: none; border-top: 1px solid #eee; margin: 24px 0; }
</style>
</head>
<body>
<div class="container">
    <h1>🔑 License Key Generator</h1>
    <p class="subtitle">School Management — Activation Tool</p>

    <div class="input-group">
        <label for="machineId">Machine ID</label>
        <input type="text" id="machineId" placeholder="Paste Machine ID here..." autocomplete="off" spellcheck="false">
    </div>

    <div class="input-group">
        <label for="expiryDate">Expiry Date</label>
        <input type="date" id="expiryDate">
    </div>

    <button id="generateBtn">Generate License Key</button>

    <div class="input-group" style="margin-top:20px">
        <label for="licenseKey">License Key</label>
        <output id="licenseKey"></output>
    </div>

    <button id="copyBtn" class="copy-btn" style="display:none">📋 Copy License Key</button>

    <hr>

    <div class="info">
        <strong>How to use:</strong>
        <ol style="margin-left:16px;margin-top:6px">
            <li>Get the <strong>Machine ID</strong> from the customer's app</li>
            <li>Set the <strong>Expiry Date</strong> for the license</li>
            <li>Click <strong>Generate</strong></li>
            <li>Send the <strong>License Key</strong> and <strong>Expiry Date</strong> to the customer</li>
            <li>Customer enters both in the app → <strong>Activate License</strong></li>
        </ol>
    </div>
</div>

<script>
const SECRET = 'skm-2026-license-secret';

async function hmacSha256(secret, message) {
    const key = await crypto.subtle.importKey(
        'raw', new TextEncoder().encode(secret),
        { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']
    );
    const sig = await crypto.subtle.sign('HMAC', key, new TextEncoder().encode(message));
    return Array.from(new Uint8Array(sig)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function formatKey(hash) {
    return hash.slice(0,4).toUpperCase() + '-' +
           hash.slice(4,8).toUpperCase() + '-' +
           hash.slice(8,12).toUpperCase() + '-' +
           hash.slice(12,16).toUpperCase();
}

async function generateKey(machineId, expiresAt) {
    const hash = await hmacSha256(SECRET, machineId.trim() + '|' + expiresAt);
    return formatKey(hash);
}

const machineInput = document.getElementById('machineId');
const dateInput = document.getElementById('expiryDate');
const keyOutput = document.getElementById('licenseKey');
const genBtn = document.getElementById('generateBtn');
const copyBtn = document.getElementById('copyBtn');

// Default to 1 year from now
dateInput.value = new Date(Date.now() + 365 * 86400000).toISOString().split('T')[0];

genBtn.addEventListener('click', async () => {
    const mid = machineInput.value.trim();
    const date = dateInput.value;
    if (!mid || !date) {
        keyOutput.textContent = '';
        copyBtn.style.display = 'none';
        return;
    }
    const ts = new Date(date).getTime();
    genBtn.textContent = 'Generating...';
    genBtn.disabled = true;
    const key = await generateKey(mid, ts);
    keyOutput.textContent = key;
    genBtn.textContent = 'Generate License Key';
    genBtn.disabled = false;
    copyBtn.style.display = 'block';
    copyBtn.textContent = '📋 Copy License Key';
    copyBtn.className = 'copy-btn';
});

machineInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') genBtn.click(); });

copyBtn.addEventListener('click', async () => {
    const text = keyOutput.textContent;
    if (!text) return;
    try {
        await navigator.clipboard.writeText(text);
        copyBtn.textContent = '✅ Copied!';
        copyBtn.classList.add('copied');
        setTimeout(() => {
            copyBtn.textContent = '📋 Copy License Key';
            copyBtn.classList.remove('copied');
        }, 2000);
    } catch { copyBtn.textContent = '❌ Copy failed'; }
});
</script>
</body>
</html>
